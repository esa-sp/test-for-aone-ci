<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elysia 后端示例 · backend-tests</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero"><div class="container">
    <span class="badge-framework" id="badge-framework"></span>
    <h1 id="hero-title"></h1>
    <p class="tagline" id="hero-tagline"></p>
    <div class="hero-actions" id="hero-actions"></div>
  </div></header>
  <section id="features-section"><div class="container">
    <h2>框架特色写法</h2>
    <p class="section-desc">链式 API · derive 类型安全注入 · 静态文件托管。</p>
    <div class="feature-grid" id="feature-grid"></div>
  </div></section>
  <section id="endpoints-section" style="background: var(--color-bg-soft);"><div class="container">
    <h2>实时接口演示</h2>
    <p class="section-desc">点击「试一试」直接调用本示例的 API。</p>
    <div class="endpoint-list" id="endpoint-list"></div>
  </div></section>
  <footer class="footer"><div class="container">
    <h2>平台能力</h2>
    <div class="tag-list" id="tag-list"></div>
    <p class="footer-meta" id="footer-meta"></p>
  </div></footer>
  <script>
    const PAGE_CONFIG = {
      framework: "Elysia", frameworkSlug: "elysia",
      tagline: "Elysia + 链式 API + derive 类型安全注入，演示 Web Fetch handler 与静态文件托管。",
      deployUrl: "{{DEPLOY_URL}}", demoUrl: "{{DEMO_URL}}",
      features: [
        { icon: "🔗", title: "链式 API", desc: ".get().post().use() 链式调用，声明式路由定义。" },
        { icon: "💉", title: "derive", desc: "类型安全地注入请求级上下文，下游路由自动推导类型。" },
        { icon: "🌐", title: "Web Fetch", desc: "app.fetch: (Request) => Response，原生 Web 标准 handler。" },
        { icon: "📄", title: "静态文件托管", desc: "通配路由 + fs.readFileSync 托管 public/ 演示页。" }
      ],
      endpoints: [
        { method: "GET", path: "/api/health", desc: "健康检查 · 类型安全表单服务状态" },
        { method: "GET", path: "/api/users/42", desc: "获取用户信息" },
        { method: "POST", path: "/api/echo", desc: "回显请求体", body: { k: "v" } },
        { method: "GET", path: "/api/nope", desc: "不存在的路径 · 返回 404" }
      ],
      productTags: ["零配置自动识别 Elysia","框架自动检测","一键部署到函数计算"]
    };
    const METHOD_CLASS = { GET: "get", POST: "post", PUT: "put", DELETE: "delete" };

    const LOGO_MAP = { express:"https://cdn.simpleicons.org/express",fastify:"https://cdn.simpleicons.org/fastify",koa:"https://cdn.simpleicons.org/koa",hono:"https://cdn.simpleicons.org/hono",elysia:"https://elysiajs.com/assets/elysia.svg",nestjs:"https://cdn.simpleicons.org/nestjs",node:"https://cdn.simpleicons.org/nodedotjs",h3:"https://cdn.simpleicons.org/h3" };
    function renderHero() {
      const heroEl = document.querySelector('.hero .container');
      const baseSlug = PAGE_CONFIG.frameworkSlug.split("-")[0];
      const logoUrl = LOGO_MAP[baseSlug];
      if (logoUrl) {
        const logo = document.createElement('img');
        logo.className = 'framework-logo'; logo.src = logoUrl; logo.alt = PAGE_CONFIG.framework;
        logo.onerror = function() { this.style.display = 'none'; };
        heroEl.insertBefore(logo, heroEl.firstChild);
      }
      document.getElementById("badge-framework").textContent = PAGE_CONFIG.framework;
      document.title = PAGE_CONFIG.framework + " 后端示例 · backend-tests";
      document.getElementById("hero-title").textContent = PAGE_CONFIG.framework + " 后端示例 · 类型安全表单";
      document.getElementById("hero-tagline").textContent = PAGE_CONFIG.tagline;
      const actions = document.getElementById("hero-actions");
      const deploy = document.createElement("a");
      deploy.className = "btn btn-primary"; deploy.href = PAGE_CONFIG.deployUrl;
      deploy.textContent = "一键部署"; deploy.target = "_blank"; deploy.rel = "noopener";
      actions.appendChild(deploy);
      const demo = document.createElement("a");
      demo.className = "btn btn-outline"; demo.href = PAGE_CONFIG.demoUrl;
      demo.textContent = "在线 Demo"; demo.target = "_blank"; demo.rel = "noopener";
      actions.appendChild(demo);
    }

    function renderFeatures() {
      const grid = document.getElementById("feature-grid");
      PAGE_CONFIG.features.forEach((f) => {
        const card = document.createElement("div");
        card.className = "feature-card";
        card.innerHTML = '<div class="feat-icon">' + f.icon + "</div><h3>" + f.title + "</h3><p>" + f.desc + "</p>";
        grid.appendChild(card);
      });
    }

    function renderEndpoints() {
      const list = document.getElementById("endpoint-list");
      PAGE_CONFIG.endpoints.forEach((ep) => {
        const card = document.createElement("div");
        card.className = "endpoint-card";
        const head = document.createElement("div");
        head.className = "endpoint-head";
        const tag = document.createElement("span");
        tag.className = "method-tag " + (METHOD_CLASS[ep.method] || "get");
        tag.textContent = ep.method;
        const pathEl = document.createElement("span");
        pathEl.className = "endpoint-path";
        pathEl.textContent = ep.path;
        head.appendChild(tag); head.appendChild(pathEl);
        const desc = document.createElement("p");
        desc.className = "endpoint-desc"; desc.textContent = ep.desc;
        const actions = document.createElement("div");
        actions.className = "endpoint-actions";
        const btn = document.createElement("button");
        btn.className = "btn btn-primary btn-sm"; btn.textContent = "试一试";
        const respBox = document.createElement("div");
        respBox.className = "response-box";
        respBox.innerHTML = '<span class="resp-placeholder">点击「试一试」查看响应…</span>';
        btn.addEventListener("click", () => callEndpoint(ep, respBox, btn));
        actions.appendChild(btn);
        card.appendChild(head); card.appendChild(desc);
        if (ep.body) {
          const bodyHint = document.createElement("p");
          bodyHint.className = "endpoint-desc";
          bodyHint.style.fontFamily = "var(--font-mono)";
          bodyHint.textContent = "请求体: " + JSON.stringify(ep.body);
          card.appendChild(bodyHint);
        }
        card.appendChild(actions); card.appendChild(respBox);
        list.appendChild(card);
      });
    }

    async function callEndpoint(ep, respBox, btn) {
      const original = btn.textContent;
      btn.textContent = "";
      const spinner = document.createElement("span");
      spinner.className = "spinner";
      btn.appendChild(spinner);
      btn.disabled = true;
      respBox.innerHTML = "";
      try {
        const opts = { method: ep.method, headers: {} };
        if (ep.body) {
          opts.headers["content-type"] = "application/json";
          opts.body = JSON.stringify(ep.body);
        }
        const res = await fetch(ep.path, opts);
        const text = await res.text();
        let pretty = text;
        try { pretty = JSON.stringify(JSON.parse(text), null, 2); } catch (e) {}
        const statusEl = document.createElement("span");
        statusEl.className = "resp-status " + (res.ok ? "ok" : "err");
        statusEl.textContent = res.status + " " + res.statusText;
        respBox.appendChild(statusEl);
        respBox.appendChild(document.createTextNode("\n" + pretty));
      } catch (err) {
        const statusEl = document.createElement("span");
        statusEl.className = "resp-status err";
        statusEl.textContent = "请求失败";
        respBox.appendChild(statusEl);
        respBox.appendChild(document.createTextNode("\n" + err.message));
      } finally {
        btn.disabled = false;
        btn.textContent = original;
      }
    }

    function renderFooter() {
      const list = document.getElementById("tag-list");
      PAGE_CONFIG.productTags.forEach((t) => {
        const tag = document.createElement("span");
        tag.className = "tag"; tag.textContent = t;
        list.appendChild(tag);
      });
      document.getElementById("footer-meta").textContent =
        "本示例由平台零配置打包部署 · 框架自动检测"
    }

    renderHero(); renderFeatures(); renderEndpoints(); renderFooter();
  </script>
</body>
</html>
